<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Slacker Tracker</title><link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet"><link rel="icon" href="favicon.png"><script defer="defer" src="bundle.60af2b1ddf17340f9a5e.js"></script></head><body><div id="app" class="app"><header class="app__header"><h1 class="app__title">Slacker Tracker</h1><button id="project-panel-open-btn" class="app__panel-open-btn shake"><i class="bx bx-archive"></i></button></header><div class="app__body"><aside id="project-panel" class="project-panel"><header class="project-panel__header"><h2 class="project-panel__title">Projects</h2><button id="project-panel-close-btn" class="project-panel__toggle-btn"><i class="bx bx-chevron-left"></i></button></header><div class="project-panel__body"><button id="project-add-btn" class="project-panel__add-btn"><i class="bx bx-plus"></i> Add Project</button><ul id="project-list" class="project-panel__list"></ul></div></aside><main id="content" class="app__main"><div class="list-view__header"><h2 id="project-title" class="list-view__title">All slacking! Add a project first.</h2><button id="list-add-btn" class="list-view__add-btn"><i class="bx bx-plus"></i> Add List</button></div><ul id="list-container" class="list-container"></ul></main></div><dialog id="project-modal" class="project-modal"><form id="project-form" class="project-modal__form"><h3 id="project-modal-title" class="project-modal__title">Add Project</h3><div class="project-modal__field"><label for="project-title-input" class="project-modal__label">TITLE</label> <input id="project-title-input" class="project-modal__input" placeholder="New project..." required/></div><div class="project-modal__action-buttons"><button type="button" id="project-cancel-btn" class="project-modal__cancel-btn">Cancel</button> <button type="submit" id="project-confirm-btn" class="project-modal__confirm-btn">Confirm</button></div></form></dialog><dialog id="list-modal" class="list-modal"><form id="list-form" class="list-modal__form"><h3 id="list-modal-title" class="list-modal__title">Add List</h3><div class="list-modal__field"><label for="list-title-input" class="list-modal__label">TITLE</label> <input id="list-title-input" class="list-modal__input" placeholder="New list..." required/></div><div class="list-modal__action-buttons"><button type="button" id="list-cancel-btn" class="list-modal__cancel-btn">Cancel</button> <button type="submit" id="list-confirm-btn" class="list-modal__confirm-btn">Confirm</button></div></form></dialog><dialog id="todo-modal" class="modal"><form id="todo-form" class="todo-modal__form"><h3 class="todo-modal__title">Add Todo</h3><div class="todo-modal__input-group"><label for="todo-input-title" class="todo-modal__label">Title:</label> <input maxlength="20" id="todo-input-title" class="todo-modal__input" required></div><div class="todo-modal__input-group"><label for="todo-input-description" class="todo-modal__label">Description:</label> <textarea id="todo-input-description" class="todo-modal__textarea"></textarea></div><div class="todo-modal__input-group"><label for="todo-input-due-date" class="todo-modal__label">Due date:</label> <input type="date" id="todo-input-due-date" class="todo-modal__input"></div><div class="todo-modal__select-group"><label for="todo-input-priority" class="todo-modal__label">Priority:</label> <select id="todo-input-priority" class="todo-modal__select"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></div><div class="todo-modal__action-buttons"><button type="button" id="todo-cancel-btn" class="todo-modal__cancel-btn">Cancel</button> <button type="submit" class="todo-modal__confirm-btn">Confirm</button></div></form></dialog></div><div id="toast-container" class="toast--container"></div></body></html>
