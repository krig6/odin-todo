<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    <%= htmlWebpackPlugin.options.title %>
  </title>
  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>

<body>
  <div id="app" class="app">

    <header class="app__header">
      <h1 class="app__title">Slacker Tracker</h1>
      <button id="project-panel-open-btn" class="app__panel-open-btn shake">
        <i class="bx bx-archive"></i>
      </button>
    </header>

    <div class="app__body">
      <aside id="project-panel" class="project-panel">
        <header class="project-panel__header">
          <h2 class="project-panel__title">Projects</h2>
          <button id="project-panel-close-btn" class="project-panel__toggle-btn">
            <i class="bx bx-chevron-left"></i>
          </button>
        </header>

        <div class="project-panel__body">
          <button id="project-add-btn" class="project-panel__add-btn">
            <i class="bx bx-plus"></i>
            Add Project
          </button>
          <ul id="project-container" class="project-panel__list"></ul>
        </div>
      </aside>

      <main id="content" class="app__main">

        <div class="list-view__header">
          <h2 id="project-title" class="list-view__title">All slacking! Add a project first.</h2>
          <button id="list-add-btn" class="list-view__add-btn">
            <i class="bx bx-plus"></i>
            Add List
          </button>
        </div>

        <ul id="list-container" class="list-container"></ul>
      </main>

    </div>

    <dialog id="unified-modal" class="modal">
      <form id="unified-modal-form" class="modal__form">
        <h3 id="unified-modal-title" class="modal__title"></h3>

        <div class="modal__field">
          <label for="unified-modal-title-input" class="modal__label">TITLE</label>
          <input type="text" id="unified-modal-title-input" class="modal__title-input" placeholder required />
        </div>

        <div class="modal__actions">
          <button type="button" id="unified-modal-cancel-btn"
            class="modal__button modal__button--cancel">Cancel</button>
          <button type="submit" id="unified-modal-confirm-btn"
            class="modal__button modal__button--confirm">Confirm</button>
        </div>
      </form>
    </dialog>

    <dialog id="todo-modal" class="modal">
      <form id="todo-form" class="todo-modal__form">
        <h3 class="todo-modal__title">Add Todo</h3>

        <div class="todo-modal__input-group">
          <label for="todo-input-title" class="todo-modal__label">Title:</label>
          <input type="text" maxlength="20" id="todo-input-title" class="todo-modal__input" required>
        </div>

        <div class="todo-modal__input-group">
          <label for="todo-input-description" class="todo-modal__label">Description:</label>
          <textarea id="todo-input-description" class="todo-modal__textarea"></textarea>
        </div>

        <div class="todo-modal__input-group">
          <label for="todo-input-due-date" class="todo-modal__label">Due date:</label>
          <input type="date" id="todo-input-due-date" class="todo-modal__input">
        </div>

        <div class="todo-modal__select-group">
          <label for="todo-input-priority" class="todo-modal__label">Priority:</label>
          <select id="todo-input-priority" class="todo-modal__select">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>

        <div class="todo-modal__action-buttons">
          <button type="button" id="todo-cancel-btn" class="todo-modal__cancel-btn">Cancel</button>
          <button type="submit" class="todo-modal__confirm-btn">Confirm</button>
        </div>
      </form>
    </dialog>
  </div>
  <div id="toast-container" class="toast--container"></div>
</body>

</html>
